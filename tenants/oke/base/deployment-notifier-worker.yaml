apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifier-worker
  namespace: oke
  labels:
    app.kubernetes.io/name: notifier-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: oke
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: notifier-worker
      app.kubernetes.io/part-of: oke
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notifier-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: oke
    spec:
      serviceAccountName: worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: redis:7-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              QUEUE=notifier-queue
              while true; do
                ITEM=$(redis-cli -h redis.oke.svc.cluster.local LPOP $QUEUE)
                if [ -n "$ITEM" ]; then
                  echo "[notifier] sending notification for $ITEM"
                  sleep 1
                else
                  sleep 2
                fi
              done
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 200m, memory: 128Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
