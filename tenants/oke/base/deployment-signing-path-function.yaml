apiVersion: apps/v1
kind: Deployment
metadata:
  name: signing-path-function
  namespace: oke
  labels:
    app.kubernetes.io/name: signing-path-function
    # Was a Cloud Run Function in the As-Is; collapses into a normal Deployment in the To-Be.
    app.kubernetes.io/component: function
    app.kubernetes.io/part-of: oke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: signing-path-function
      app.kubernetes.io/part-of: oke
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signing-path-function
        app.kubernetes.io/component: function
        app.kubernetes.io/part-of: oke
    spec:
      serviceAccountName: app
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: signing-path-function
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 200m, memory: 128Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
