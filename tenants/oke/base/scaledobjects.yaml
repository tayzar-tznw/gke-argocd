---
# Cron-scaled: scale up at predictable times (e.g. payroll dispatch window),
# scale back to 0 outside the window. Replace these times with the actual SmartHR
# business cycle when productionizing.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: mailer-worker
  namespace: oke
spec:
  scaleTargetRef:
    name: mailer-worker
  minReplicaCount: 0
  maxReplicaCount: 5
  pollingInterval: 30
  cooldownPeriod: 60
  triggers:
    - type: cron
      metadata:
        timezone: Asia/Tokyo
        # Up at the top of every hour for 10 minutes — demo-friendly cadence.
        start: "0 * * * *"
        end:   "10 * * * *"
        desiredReplicas: "3"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: cert-update-worker
  namespace: oke
spec:
  scaleTargetRef:
    name: cert-update-worker
  minReplicaCount: 0
  maxReplicaCount: 2
  pollingInterval: 30
  cooldownPeriod: 120
  triggers:
    - type: cron
      metadata:
        timezone: Asia/Tokyo
        # Quick burst every 30 minutes — replace with the real cert-rotation schedule.
        start: "0,30 * * * *"
        end:   "5,35 * * * *"
        desiredReplicas: "1"
