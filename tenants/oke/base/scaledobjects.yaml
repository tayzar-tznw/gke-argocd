# KEDA ScaledObjects for oke workers.
# - Queue-driven workers use the `redis` scaler against an in-cluster Redis list.
# - mailer-worker and cert-update-worker use the `cron` scaler to model the
#   "predictable spike usage" pattern called out in project.md (payroll/HR cycles).

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: document-build-worker
  namespace: oke
spec:
  scaleTargetRef:
    name: document-build-worker
  minReplicaCount: 0
  maxReplicaCount: 10
  pollingInterval: 15
  cooldownPeriod: 60
  triggers:
    - type: redis
      metadata:
        address: redis.oke.svc.cluster.local:6379
        listName: document-build-queue
        listLength: "5"
---
