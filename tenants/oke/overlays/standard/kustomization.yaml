apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

commonAnnotations:
  smarthr.io/cluster-flavor: standard

# Route the io-heavy-worker pods to the io-heavy node pool. This is the
# bit Autopilot can't express — Autopilot picks the node class for you.
patches:
  - target:
      kind: Deployment
      name: io-heavy-worker
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          pool: io-heavy
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: workload
            operator: Equal
            value: io-heavy
            effect: NoSchedule
