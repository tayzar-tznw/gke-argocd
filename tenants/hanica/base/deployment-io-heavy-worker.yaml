apiVersion: apps/v1
kind: Deployment
metadata:
  name: io-heavy-worker
  namespace: hanica
  labels:
    app.kubernetes.io/name: io-heavy-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: hanica
    workload-class: io-heavy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: io-heavy-worker
      app.kubernetes.io/part-of: hanica
  template:
    metadata:
      labels:
        app.kubernetes.io/name: io-heavy-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: hanica
        workload-class: io-heavy
    spec:
      serviceAccountName: worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: io-heavy-worker
          image: busybox:1.37
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                echo "[io-heavy] $(date -u +%FT%TZ) heavy IO job"
                sleep 15
              done
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
