apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: hanica
  labels:
    app.kubernetes.io/name: app
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: hanica
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: app
      app.kubernetes.io/part-of: hanica
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: hanica
    spec:
      serviceAccountName: app
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          # Placeholder image — CI replaces with the built sample image.
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: hanica-app
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
