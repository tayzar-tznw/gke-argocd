apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Autopilot overlay: no node pool steering (Autopilot manages nodes implicitly).
# Kept as an overlay layer so production overrides (resource sizing per env)
# can be added here without touching the base.

resources:
  - ../../base

commonAnnotations:
  smarthr.io/cluster-flavor: autopilot
