apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Standard overlay: route io-heavy-worker to the io-heavy-pool via toleration + nodeSelector.
# This is the demonstrably-impossible-on-Autopilot bit of the demo.

resources:
  - ../../base

commonAnnotations:
  smarthr.io/cluster-flavor: standard

patches:
  - target:
      kind: Deployment
      name: io-heavy-worker
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          pool: io-heavy
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: workload
            operator: Equal
            value: io-heavy
            effect: NoSchedule
