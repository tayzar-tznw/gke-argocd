# ========================================================================
# ILLUSTRATIVE — does not execute in this demo.
#
# This file shows the `terraform plan` workflow that runs on every PR in
# the real `smarthr/smarthr-terraform` repo. It plans the affected
# environment(s) and posts the diff as a PR comment, so reviewers can see
# exactly what `apply.yml` will do when the PR merges.
# ========================================================================
name: terraform-plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'environments/**'
      - 'modules/**'

permissions:
  contents: read
  id-token: write
  pull-requests: write   # to post the plan output as a PR comment

env:
  TF_VERSION: '1.15.3'
  WIF_PROVIDER: projects/87614275791/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
  GCP_SA: gh-actions-deployer@smart-hr-demo-499522.iam.gserviceaccount.com

jobs:
  detect-changed-envs:
    name: Detect changed environments
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.detect.outputs.envs }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: detect
        name: List changed environment dirs
        run: |
          changed=$(git diff --name-only origin/main...HEAD \
                    | awk -F/ '/^environments\// {print $2}' \
                    | sort -u | jq -Rsc 'split("\n")|map(select(.!=""))')
          echo "envs=${changed}" >> "$GITHUB_OUTPUT"

  plan:
    name: terraform plan (${{ matrix.env }})
    needs: detect-changed-envs
    if: ${{ needs.detect-changed-envs.outputs.envs != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.detect-changed-envs.outputs.envs) }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: environments/${{ matrix.env }}
        run: terraform init -input=false

      - name: terraform plan
        id: plan
        working-directory: environments/${{ matrix.env }}
        run: |
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('environments/${{ matrix.env }}/plan.txt', 'utf8');
            const body = `### terraform plan — \`${{ matrix.env }}\`\n\n<details><summary>plan output</summary>\n\n\`\`\`\n${plan.slice(-60000)}\n\`\`\`\n</details>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
