apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: hanica
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: hanica
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
      app.kubernetes.io/part-of: hanica
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: hanica
    spec:
      serviceAccountName: worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          # Placeholder — stands in for a Sidekiq-style background worker.
          # In production this would be the real Rails worker image.
          image: busybox:1.37
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                echo "[worker] $(date -u +%FT%TZ) processing job"
                sleep 10
              done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
