apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-update-worker
  namespace: oke
  labels:
    app.kubernetes.io/name: cert-update-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: oke
spec:
  # Cron-scaled — models periodic cert rotation work that runs at a known time.
  selector:
    matchLabels:
      app.kubernetes.io/name: cert-update-worker
      app.kubernetes.io/part-of: oke
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cert-update-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: oke
    spec:
      serviceAccountName: worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: busybox:1.37
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                echo "[cert-update] $(date -u +%FT%TZ) rotating cert"
                sleep 30
              done
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 200m, memory: 128Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
