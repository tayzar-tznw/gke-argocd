apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsukekae
  namespace: oke
  labels:
    app.kubernetes.io/name: tsukekae
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: oke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tsukekae
      app.kubernetes.io/part-of: oke
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tsukekae
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: oke
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tsukekae
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 200m, memory: 128Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
