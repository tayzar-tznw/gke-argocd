apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-build-worker
  namespace: oke
  labels:
    app.kubernetes.io/name: document-build-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: oke
spec:
  # replicas managed by KEDA ScaledObject; min=0 demonstrates scale-to-zero.
  selector:
    matchLabels:
      app.kubernetes.io/name: document-build-worker
      app.kubernetes.io/part-of: oke
  template:
    metadata:
      labels:
        app.kubernetes.io/name: document-build-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: oke
    spec:
      serviceAccountName: worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: redis:7-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              QUEUE=document-build-queue
              while true; do
                ITEM=$(redis-cli -h redis.oke.svc.cluster.local LPOP $QUEUE)
                if [ -n "$ITEM" ]; then
                  echo "[document-build] processing $ITEM"
                  sleep 3
                else
                  sleep 2
                fi
              done
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 256Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
