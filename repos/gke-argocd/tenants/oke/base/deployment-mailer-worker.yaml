apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailer-worker
  namespace: oke
  labels:
    app.kubernetes.io/name: mailer-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: oke
spec:
  # Scaled by KEDA on a cron schedule — models the "predictable spike" use case
  # (e.g. monthly payroll batch emails).
  selector:
    matchLabels:
      app.kubernetes.io/name: mailer-worker
      app.kubernetes.io/part-of: oke
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mailer-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: oke
    spec:
      serviceAccountName: worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: busybox:1.37
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                echo "[mailer] $(date -u +%FT%TZ) sending email batch"
                sleep 15
              done
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 200m, memory: 128Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
