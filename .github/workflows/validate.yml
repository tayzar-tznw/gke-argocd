name: validate

on:
  pull_request:
    branches: [main]

jobs:
  kustomize-build:
    name: kustomize build + kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/

      - name: kustomize build + kubeconform validate (every overlay)
        run: |
          set -euo pipefail
          for overlay in \
              tenants/hanica/overlays/autopilot \
              tenants/hanica/overlays/standard \
              tenants/oke/overlays/autopilot \
              tenants/oke/overlays/standard \
              platform/cluster-bootstrap; do
            echo "==> Validating $overlay"
            kubectl kustomize "$overlay" | kubeconform \
              -strict \
              -summary \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -skip ScaledObject,TriggerAuthentication \
              -
          done
